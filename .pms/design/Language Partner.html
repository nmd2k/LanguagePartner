<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Language Partner — UI Design</title>
<link rel="stylesheet" href="tokens.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="phone.jsx"></script>
<script type="text/babel" src="android-main.jsx"></script>
<script type="text/babel" src="android-auth.jsx"></script>
<script type="text/babel" src="android-debug.jsx"></script>
<script type="text/babel" src="dashboard-overview.jsx"></script>
<script type="text/babel" src="dashboard-models.jsx"></script>
<script type="text/babel" src="dashboard-users.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "oklch(56% 0.09 220)",
  "bubbleStyle": "rounded",
  "dashDensity": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    document.documentElement.style.setProperty('--accent-2', tweaks.accent.replace(')', ' / 0.08)').replace('oklch(', 'oklch('));
    document.documentElement.style.setProperty('--accent-ink', tweaks.accent.replace(/56%/, '40%'));
  }, [tweaks.accent]);

  // Dashboard artboard wrapper
  const Dash = ({ children, w = 900, h = 580 }) => (
    <div style={{ width: w, height: h, overflow: 'hidden', background: 'var(--bg)', position: 'relative', display: 'flex', flexDirection: 'column' }}>
      {children}
    </div>
  );

  return (
    <>
      <DesignCanvas>
        {/* ── Android Client ── */}
        <DCSection id="android" title="Android Client" subtitle="EN ↔ 普通话 · conversational bubbles + voice-print speakers">
          <DCArtboard id="onboarding" label="01 Onboarding" width={320} height={780}>
            <ScreenOnboarding />
          </DCArtboard>
          <DCArtboard id="login" label="02 Login" width={320} height={780}>
            <ScreenLogin />
          </DCArtboard>
          <DCArtboard id="server" label="03 Server Setup" width={320} height={780}>
            <ScreenServerSetup />
          </DCArtboard>
          <DCArtboard id="main" label="04 Live Translation" width={320} height={780}>
            <ScreenMain />
          </DCArtboard>
          <DCArtboard id="lang" label="05 Language Picker" width={320} height={780}>
            <ScreenLangPicker />
          </DCArtboard>
          <DCArtboard id="settings" label="06 Settings" width={320} height={780}>
            <ScreenSettings />
          </DCArtboard>
          <DCArtboard id="debug" label="07 Debug" width={320} height={780}>
            <ScreenDebug />
          </DCArtboard>
        </DCSection>

        {/* ── Web Dashboard ── */}
        <DCSection id="dashboard" title="Web Dashboard" subtitle="Super-user control plane · model hosting, sessions, users">
          <DCArtboard id="d-overview" label="01 Overview" width={900} height={580}>
            <Dash><DashOverview /></Dash>
          </DCArtboard>
          <DCArtboard id="d-models" label="02 Models" width={900} height={580}>
            <Dash><DashModels /></Dash>
          </DCArtboard>
          <DCArtboard id="d-sessions" label="03 Sessions" width={900} height={580}>
            <Dash><DashSessions /></Dash>
          </DCArtboard>
          <DCArtboard id="d-users" label="04 Users &amp; Devices" width={900} height={580}>
            <Dash><DashUsers /></Dash>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection title="Accent color">
          <TweakColor label="Primary accent" valueKey="accent" />
        </TweakSection>
        <TweakSection title="Bubble style">
          <TweakRadio label="Shape" valueKey="bubbleStyle" options={[{label:"Rounded",value:"rounded"},{label:"Square",value:"square"}]} />
        </TweakSection>
        <TweakSection title="Dashboard density">
          <TweakRadio label="Density" valueKey="dashDensity" options={[{label:"Compact",value:"compact"},{label:"Comfortable",value:"comfortable"}]} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
